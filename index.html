<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성역 무역소</title>
    <style>
        body { background-color: #fcfbfa; color: #2c2623; font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; text-align: center; }
        
        h1 { color: #801d1d; font-size: 2.5rem; margin-bottom: 5px; }
        .subtitle { color: #73675c; font-size: 1.1rem; margin-bottom: 20px; }
        
        .status-badge { display: inline-flex; align-items: center; gap: 8px; font-weight: bold; padding: 6px 16px; border-radius: 20px; margin-bottom: 15px; font-size: 0.9rem; }
        .status-on { background: #e6f9ed; color: #137333; border: 1px solid #c2eed0; }
        .status-off { background: #fce8e6; color: #c5221f; border: 1px solid #fad2cf; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-on .dot { background: #137333; box-shadow: 0 0 8px #137333; }
        .status-off .dot { background: #c5221f; }

        .counter-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; font-size: 0.95rem; font-weight: bold; color: #594f47; }
        .counter-item { background: #f2efe9; padding: 6px 14px; border-radius: 20px; border: 1px solid #e0dacb; }
        .counter-num { color: #801d1d; }
        .notice-bar { background: #fff1f1; color: #a62424; padding: 12px; border-radius: 6px; margin-bottom: 30px; font-weight: bold; border: 1px solid #f2cfcf; display: none; }
        
        .section-title { font-size: 1.4rem; color: #5c4b37; border-bottom: 2px solid #e6dfd3; padding-bottom: 10px; margin-top: 40px; text-align: left; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #ffffff; border: 1px solid #e6dfd3; border-radius: 8px; padding: 20px; text-align: left; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); border-color: #801d1d; }
        .card h3 { margin-top: 0; color: #2c2623; font-size: 1.2rem; }
        .price { font-size: 1.3rem; color: #b37400; font-weight: bold; margin: 15px 0; }
        .tag { display: inline-block; background: #f7eedb; color: #a66f00; font-size: 0.8rem; padding: 3px 8px; border-radius: 4px; margin-bottom: 10px; width: fit-content; font-weight: bold; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn-buy { background: #801d1d; color: white; border: none; padding: 11px; flex-grow: 1; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-view { background: #f2efe9; color: #5c4b37; border: 1px solid #e0dacb; padding: 11px; font-weight: bold; border-radius: 4px; cursor: pointer; }

        .cta-box { background: #ffffff; border: 2px dashed #bda37e; padding: 30px; margin-top: 40px; border-radius: 8px; }
        .input-field { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #dcd3c4; background: #fff; color: #2c2623; box-sizing: border-box; }
        #shop-content { text-align: left; }

        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { max-width: 90%; max-height: 80%; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .close { position: absolute; top: 20px; right: 35px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; }

        .review-section { margin-top: 60px; border-top: 2px dashed #e6dfd3; padding-top: 40px; text-align: left; }
    </style>

    <!-- 🌐 Firebase 웹 호환 레이어 스크립트 선언 -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>

    <div class="container">
        <div id="status-area"></div>
        <h1 id="main-title">로딩 중...</h1>
        <div class="subtitle" id="sub-title">상점 정보를 불러오고 있습니다.</div>
        
        <div class="counter-bar">
            <div class="counter-item">🟢 현재 동시 접속: <span id="current-users" class="counter-num">1</span>명</div>
            <div class="counter-item">📊 누적 방문: <span id="total-hits" class="counter-num">로딩 중...</span>명</div>
        </div>

        <div class="notice-bar" id="notice-box"></div>
        <div id="shop-content"></div>

        <div class="cta-box" style="margin-top: 50px;">
            <h2>🛒 실시간 구매 접수</h2>
            <div style="max-width: 400px; margin: 0 auto; text-align: left;">
                <label style="display:block; margin-bottom:5px; font-weight:bold;">선택한 상품</label>
                <input type="text" id="selected-item" class="input-field" readonly placeholder="위에서 상품을 선택해 주세요.">
                <label style="display:block; margin-bottom:5px; font-weight:bold;">배틀태그 또는 연락처</label>
                <input type="text" id="user-contact" class="input-field" placeholder="예: 홍길동#1234 또는 010-1234-5678">
                <!-- 🚀 window.sendNotification 호출 방식으로 안전하게 변경 완료 -->
                <button onclick="window.sendNotification()" style="width:100%; padding:15px; background:#5c4b37; color:#fff; font-weight:bold; border:none; border-radius:4px; cursor:pointer; font-size:1.1rem;">⚡ 최종 구매 신청 (기사에게 즉시 알림)</button>
            </div>
        </div>

        <div class="review-section">
            <h3 style="font-size: 1.4rem; color: #5c4b37;">💬 고객 후기 및 방명록</h3>
            <p style="color: #73675c; font-size: 0.9rem; margin-bottom: 20px;">서비스를 이용하신 후 소중한 한 줄 평을 남겨주세요! (깃허브 로그인이 필요합니다)</p>
            <div id="comment-box"></div>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="imgPopup">
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD36u6bSrzrhgDRasi_gd0PtiVIYNdrx0M",
            authDomain: "://firebaseapp.com",
            projectId: "publish-aba68",
            storageBucket: "publish-aba68.firebasestorage.app",
            messagingSenderId: "581338711761",
            appId: "1:581338711761:web:ba5da8e39db876ef9aa7f0"
        };

        const GOODS_CSV_URL = "https://google.com";
        const CONFIG_CSV_URL = "https://google.com";
        const DISCORD_WEBHOOK_URL = "https://discord.com";
        const GITHUB_REPO = "Goodnete/d1d2"; 

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const mySessionId = 'user_' + Math.random().toString(36).substr(2, 9);
        const userRef = db.collection("active_users").doc(mySessionId);
        
        userRef.set({ timestamp: new Date() }).then(() => {
            window.addEventListener('beforeunload', () => { userRef.delete(); });
        });

        db.collection("active_users").onSnapshot((snapshot) => {
            document.getElementById('current-users').innerText = snapshot.size;
        });

        const counterRef = db.collection("site_stats").doc("visits_counter");
        async function updateAndGetHits() {
            try {
                await db.runTransaction(async (transaction) => {
                    const sfDoc = await transaction.get(counterRef);
                    if (!sfDoc.exists) { transaction.set(counterRef, { count: 1 }); } 
                    else { transaction.update(counterRef, { count: sfDoc.data().count + 1 }); }
                });
                const finalDoc = await counterRef.get();
                document.getElementById('total-hits').innerText = finalDoc.data().count;
            } catch (e) { document.getElementById('total-hits').innerText = "1"; }
        }
        updateAndGetHits();

        async function loadConfigData() {
            try {
                const response = await fetch(CONFIG_CSV_URL);
                const data = await response.text();
                const rows = data.split("\n").slice(1);
                rows.forEach(row => {
                    const columns = row.split(",");
                    if (columns.length < 2) return;
                    const key = columns[0].trim();
                    const value = columns[1].trim();
                    if (key === "shop_name") document.getElementById('main-title').innerText = value;
                    if (key === "shop_sub") document.getElementById('sub-title').innerText = value;
                    if (key === "notice" && value) {
                        const noticeBox = document.getElementById('notice-box');
                        noticeBox.innerText = "📢 공지: " + value;
                        noticeBox.style.display = "block";
                    }
                    if (key === "status") {
                        const statusArea = document.getElementById('status-area');
                        if (value === "영업중") {
                            statusArea.innerHTML = '<div class="status-badge status-on"><span class="dot"></span>기사 실시간 대기 중 (즉시 가능)</div>';
                        } else {
                            statusArea.innerHTML = '<div class="status-badge status-off"><span class="dot"></span>현재 부재 중 (예약 접수 가능)</div>';
                        }
                    }
                });
