<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 관리 상점</title>
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 15px; 
            background-color: #0d0e12; 
            color: #ffffff;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }
        *, *:before, *:after { box-sizing: inherit; }
        img { -webkit-user-drag: none; user-drag: none; max-width: 100%; }

        .status-bar {
            text-align: center; padding: 14px; border-radius: 30px; font-weight: bold; font-size: 14px; margin-bottom: 25px; transition: all 0.3s ease; letter-spacing: 0.5px;
        }
        .status-bar.on { background-color: #064e3b; color: #34d399; box-shadow: 0 0 15px rgba(52, 211, 153, 0.4); border: 1px solid #059669; }
        .status-bar.off { background-color: #7f1d1d; color: #fca5a5; box-shadow: 0 0 15px rgba(252, 165, 165, 0.4); border: 1px solid #dc2626; }
        
        .main-header { text-align: center; margin-bottom: 30px; padding: 0 10px; }
        .main-header h1 { font-size: 36px; font-weight: 900; margin: 0 0 10px 0; letter-spacing: 1px; color: #a855f7; text-shadow: 0 0 10px rgba(168, 85, 247, 0.6); word-break: keep-all; }
        .main-header .subtitle { color: #9ca3af; font-size: 15px; margin: 0 0 15px 0; font-weight: 500; word-break: keep-all; }
        .main-header .notice { color: #06b6d4; font-size: 13px; background: rgba(6, 182, 212, 0.1); padding: 10px 18px; border-radius: 8px; display: inline-block; border: 1px solid rgba(6, 182, 212, 0.4); font-weight: 600; width: 100%; max-width: 500px; word-break: keep-all; }
        
        .section-divider { margin: 30px 0; height: 1px; background: linear-gradient(to right, transparent, #a855f7, #06b6d4, #a855f7, transparent); }
        .section-title { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 25px; color: #06b6d4; letter-spacing: 1px; text-shadow: 0 0 8px rgba(6, 182, 212, 0.4); }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 5px; }
        .menu-card { background: #161920; border: 1px solid #1f2937; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5); transition: all 0.25s ease-in-out; }
        .menu-card:hover { transform: translateY(-3px); border-color: #06b6d4; box-shadow: 0 0 12px rgba(6, 182, 212, 0.3); }
        .menu-card:hover .menu-name { color: #06b6d4; }
        
        .menu-img { width: 100%; height: 140px; object-fit: cover; background: #090a0f; border-bottom: 1px solid #1f2937; }
        .menu-info { padding: 12px; display: flex; flex-direction: column; flex-grow: 1; }
        .menu-name { font-size: 15px; font-weight: bold; margin: 0 0 6px 0; color: #ffffff; transition: color 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .menu-price { font-size: 15px; color: #c084fc; font-weight: 800; margin: 0 0 12px 0; padding-bottom: 8px; border-bottom: 1px dashed #1f2937; }
        
        .buy-btn { margin-top: auto; background: linear-gradient(135deg, #a855f7 0%, #6b21a8 100%); color: #ffffff; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .buy-btn:hover { background: linear-gradient(135deg, #c084fc 0%, #a855f7 100%); box-shadow: 0 0 10px rgba(168, 85, 247, 0.6); }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .main-header h1 { font-size: 28px; }
            .main-header .subtitle { font-size: 14px; }
            .menu-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
            .menu-img { height: 110px; }
            .menu-info { padding: 10px; }
            .menu-name { font-size: 14px; }
            .menu-price { font-size: 14px; }
            .buy-btn { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <div id="status-bar" class="status-bar off">구글 스프레드시트 연동 중...</div>

    <div class="main-header">
        <h1 id="site-title">마켓 로딩 중</h1>
        <p id="site-subtitle" class="subtitle">데이터 동기화 중...</p>
        <div id="site-notice" class="notice">공지사항을 가져오는 중입니다...</div>
    </div>

    <div class="section-divider"></div>
    <div class="section-title">주문 가격표</div>

    <div id="menu-container" class="menu-grid">
        <p style="text-align: center; grid-column: 1/-1; color: #6b7280;">상품 리스트를 불러오고 있습니다...</p>
    </div>

    <script>
        const FORMSPREE_SECURE_URL = 'https://formspree.io/f/maqzwlzz'; 
        
        // ⚠️ 따옴표 내부에 방금 추출한 시트별 복사 주소(.csv 링크)를 각각 정확히 붙여넣어 주세요!
        const URL_CSV_SHEET1 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCMxXYlK_oQcmQvgfKZZfdm0jgBtU9-z_Zu7RDPxTPLUl2bJ3amGjzpOiuiT9MH-wD_klSUkynKpvD/pub?gid=0&single=true&output=csv'; 
        const URL_CSV_SHEET2 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCMxXYlK_oQcmQvgfKZZfdm0jgBtU9-z_Zu7RDPxTPLUl2bJ3amGjzpOiuiT9MH-wD_klSUkynKpvD/pub?gid=688070023&single=true&output=csv'; 

        let sheet1Data = null; 
        let sheet2Data = null;

        // CSV 문자열을 2차원 배열로 안전하게 파싱하는 함수
        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.map(line => {
                // 쉼표로 분리하되 큰따옴표 안의 쉼표는 무시하는 정규식
                const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || line.split(',');
                return matches.map(val => val.replace(/^"|"$/g, '').trim());
            });
        }

        function renderInterface() {
            if (!sheet1Data || !sheet2Data) return;

            // 1. Sheet1 데이터 매핑 (2행 [1번 줄]의 A열 [0번 칸])
            const targetRow1 = sheet1Data[1];
            const currentStatus = targetRow1 && targetRow1[0] ? targetRow1[0].toUpperCase() : 'OFF';
            
            // 2. Sheet2 데이터 매핑 (1행=타이틀, 2행=한줄소개, 3행=공지사항, 4행=상태문구) -> 모두 B열 [1번 칸]
            const titleValue = (sheet2Data[0] && sheet2Data[0][1]) ? sheet2Data[0][1] : '레스너 SHOP';
            const subtitleValue = (sheet2Data[1] && sheet2Data[1][1]) ? sheet2Data[1][1] : '아이템 거래 플랫폼';
            const noticeValue = (sheet2Data[2] && sheet2Data[2][1]) ? sheet2Data[2][1] : '공지사항이 없습니다.';
            const customStatusText = (sheet2Data[3] && sheet2Data[3][1]) ? sheet2Data[3][1] : null;

            // 상단 상태 바 조율
            const statusBar = document.getElementById('status-bar');
            statusBar.innerText = customStatusText || (currentStatus === 'ON' ? '🟢 영업 중' : '🔴 부재 중');
            statusBar.className = (currentStatus === 'ON') ? "status-bar on" : "status-bar off";

            // 상단 텍스트 바인딩
            document.getElementById('site-title').innerText = titleValue;
            document.getElementById('site-subtitle').innerText = subtitleValue;
            document.getElementById('site-notice').innerText = noticeValue;

            // 3. 상품 목록 렌더링 (Sheet1 데이터 기반, 2행부터 순회)
            const container = document.getElementById('menu-container');
            container.innerHTML = ''; 

            for (let i = 1; i < sheet1Data.length; i++) {
                const row = sheet1Data[i];
                if (!row || row.length < 2) continue;

                // CSV 구조 매핑: A열[0]=접속상태, B열[1]=이름, C열[2]=가격, D열[3]=사진URL
                const name = row[1];  
                const price = row[2]; 
                const img = row[3] || 'https://placeholder.com'; 

                if (!name || name === "이름") continue; 

                container.innerHTML += `
                    <div class="menu-card">
                        <img src="${img}" class="menu-img" alt="${name}" oncontextmenu="return false;" ondragstart="return false;">
                        <div class="menu-info">
                            <p class="menu-name" title="${name}">${name}</p>
                            <p class="menu-price">${isNaN(Number(price)) ? price : Number(price).toLocaleString() + ' 원'}</p>
                            <button class="buy-btn" onclick="sendOrder('${name}', '${price}')">즉시 구매 요청</button>
                        </div>
                    </div>`;
            }
        }

        // Sheet2 (상점 메타 정보 CSV) 로드
        fetch(URL_CSV_SHEET2).then(res => res.text()).then(text => {
            sheet2Data = parseCSV(text);
            renderInterface();
        }).catch(err => console.error("Sheet2 CSV 로드 실패:", err));

        // Sheet1 (상품 리스트 CSV) 로드
        fetch(URL_CSV_SHEET1).then(res => res.text()).then(text => {
            sheet1Data = parseCSV(text);
            renderInterface();
        }).catch(err => console.error("Sheet1 CSV 로드 실패:", err));

        function sendOrder(menuName, menuPrice) {
            const confirmOrder = confirm(`[${menuName}] 상품을 구매 신청하시겠습니까?`);
            if (!confirmOrder) return;
            const siteName = document.getElementById('site-title').innerText;
            fetch(FORMSPREE_SECURE_URL, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ "상점명": siteName, "신청상품": menuName, "금액": isNaN(Number(menuPrice)) ? menuPrice : Number(menuPrice).toLocaleString() + '원', "시간": new Date().toLocaleString('ko-KR') })
            }).then(res => {
                if (res.ok) alert('구매 요청이 안전하게 전송되었습니다!');
                else alert('Formspree 오류가 발생했습니다. 대시보드를 확인하세요.');
            });
        }
        window.addEventListener('keydown', function (e) { if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 86 || (e.shiftKey && e.keyCode === 73))) { e.preventDefault(); return false; } });
    </script>
</body>
</html>
