    <script>
        // 1. 전체 주소가 아닌 순수 시트 ID만 입력해야 합니다.
        const SHEET_ID = '1LR8lOlX9cDIz8rXWlyHWJgowEhoLcSeCyeZucLOitUg'; 
        const FORMSPREE_SECURE_URL = 'https://formspree.io/f/maqzwlzz'; 

        // 2. 주소 생성 방식 수정 ($ 추가 및 구글 도메인 중복 제거)
        const URL_SHEET1 = `https://google.com{SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;
        const URL_SHEET2 = `https://google.com{SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet2`;

        function parseGoogleData(text) {
            try {
                const start = text.indexOf('{');
                const end = text.lastIndexOf('}') + 1;
                return JSON.parse(text.substring(start, end)).table.rows;
            } catch (e) { return null; }
        }

        let sheet1Data = null; let sheet2Data = null;

        function updateStatusBar() {
            if (!sheet1Data || !sheet2Data) return;
            const currentStatus = sheet1Data[0]?.c[0]?.v || 'OFF';
            const customStatusText = sheet2Data[0]?.c[0]?.v || (currentStatus.toUpperCase() === 'ON' ? '🟢 영업 중' : '🔴 부재 중');
            const statusBar = document.getElementById('status-bar');
            statusBar.innerText = customStatusText;
            if(currentStatus.toUpperCase() === 'ON') { statusBar.className = "status-bar on"; } 
            else { statusBar.className = "status-bar off"; }
        }

        fetch(URL_SHEET2).then(res => res.text()).then(data => {
            const rows = parseGoogleData(data);
            if(!rows || rows.length === 0) return; sheet2Data = rows;
            // 데이터를 안전하게 가져오기 위해 배열 인덱스 구조로 수정
            document.getElementById('site-title').innerText = rows[0]?.c[0]?.v || '상점';
            document.getElementById('site-subtitle').innerText = rows[1]?.c[0]?.v || '';
            document.getElementById('site-notice').innerText = rows[2]?.c[0]?.v || '공지사항이 없습니다.';
            updateStatusBar();
        }).catch(err => console.error("Sheet2 로드 실패:", err));

        fetch(URL_SHEET1).then(res => res.text()).then(data => {
            const rows = parseGoogleData(data);
            if(!rows || rows.length === 0) return; sheet1Data = rows; updateStatusBar();
            const container = document.getElementById('menu-container');
            container.innerHTML = ''; 
            for(let i = 1; i < rows.length; i++) {
                const row = rows[i]; 
                const name = row.c[0]?.v; 
                const price = row.c[1]?.v; 
                const img = row.c[2]?.v || 'https://placeholder.com';
                if (!name) continue; 
                container.innerHTML += `<div class="menu-card"><img src="${img}" class="menu-img" alt="${name}" oncontextmenu="return false;" ondragstart="return false;"><div class="menu-info"><p class="menu-name">${name}</p><p class="menu-price">${Number(price).toLocaleString()} 원</p><button class="buy-btn" onclick="sendOrder('${name}', '${price}')">즉시 구매 요청</button></div></div>`;
            }
        }).catch(err => console.error("Sheet1 로드 실패:", err));

        function sendOrder(menuName, menuPrice) {
            const confirmOrder = confirm(`[${menuName}] 상품을 구매 신청하시겠습니까?`);
            if (!confirmOrder) return;
            const siteName = document.getElementById('site-title').innerText;
            fetch(FORMSPREE_SECURE_URL, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ "상점명": siteName, "신청상품": menuName, "금액": `${Number(menuPrice).toLocaleString()}원`, "시간": new Date().toLocaleString('ko-KR') })
            }).then(res => {
                if (res.ok) alert('구매 요청이 안전하게 전송되었습니다!');
                else alert('Formspree 오류가 발생했습니다.');
            });
        }
        window.addEventListener('keydown', function (e) { if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 86 || (e.shiftKey && e.keyCode === 73))) { e.preventDefault(); return false; } });
    </script>
