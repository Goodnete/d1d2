<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 관리 상점</title>
    <link rel="stylesheet" href="https://googleapis.com">
    <style>
        :root {
            --bg-color: #0b0204;       
            --card-bg: #140508;        
            --border-color: #2c0d12;    
            --primary: #dc2626;         
            --secondary: #991b1b;       
            --text-main: #e2e8f0;       
            --text-muted: #94a3b8;      
        }
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 20px 15px; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }
        *, *:before, *:after { box-sizing: inherit; }
        img { -webkit-user-drag: none; user-drag: none; max-width: 100%; }

        /* 🟥 스케치 1구역: 상점명 / 메인 공지사항 박스 */
        .top-notice-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px 20px;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .top-notice-box h1 { 
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            font-size: 32px; font-weight: 900; margin: 0 0 10px 0; letter-spacing: 1px;
            color: var(--text-main);
        }
        .top-notice-box .subtitle { 
            color: #ef4444; font-size: 14px; font-weight: 700; 
            background: rgba(220, 38, 38, 0.1); padding: 8px 16px; 
            border-radius: 6px; display: inline-block; border: 1px solid rgba(220, 38, 38, 0.25);
            word-break: break-all; line-height: 1.5; width: 100%; max-width: 750px;
        }

        /* 🟥 스케치 2구역: 버튼들과 매니저 상태 배치 */
        .middle-action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .link-btn-container { display: flex; gap: 10px; flex-grow: 1; }
        .link-btn { 
            flex-grow: 1; text-align: center; display: inline-flex; align-items: center; justify-content: center; 
            padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 700; 
            text-decoration: none; color: var(--text-main); background: #1c0a0d; border: 1px solid var(--border-color);
            transition: all 0.2s ease-in-out; cursor: pointer;
        }
        .btn-discord:hover { background-color: #5865F2; border-color: #5865F2; box-shadow: 0 0 15px rgba(88, 101, 242, 0.4); }
        .btn-kakao:hover { background-color: #FEE500; color: #191919; border-color: #FEE500; box-shadow: 0 0 15px rgba(254, 229, 0, 0.4); }

        /* 🟢 글로우 입체 매니저 배지 */
        .status-badge {
            display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 6px 20px; border-radius: 8px; font-size: 11px; font-weight: 500; color: var(--text-muted);
            background-color: var(--card-bg); border: 1px solid var(--border-color); min-width: 120px; height: 47px;
        }
        .status-badge strong { font-size: 14px; font-weight: 900; margin-top: 1px; letter-spacing: 0.5px; }
        
        .status-badge.on strong { color: #34d399; text-shadow: 0 0 8px rgba(52, 211, 153, 0.6); }
        .status-badge.off strong { color: #fca5a5; text-shadow: 0 0 8px rgba(248, 113, 113, 0.6); }
        
        /* 🟥 스케치 3구역: 서브 공지 2 박스 (전광판 무빙 스크롤) */
        .sub-notice-wrap {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 0; 
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            overflow: hidden; 
            position: relative;
            width: 100%;
        }
        .sub-notice-box {
            font-size: 18px;font-weight: 900; margin: 0 0 10px 0;
            color: var(--text-muted);
            line-height: 1.5;
            display: inline-block;
            white-space: nowrap; 
            padding-left: 100%; 
            animation: subTicker 18s linear infinite; 
        }
        
        @keyframes subTicker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* 🟥 스케치 4구역: 주문 가격표 그리드 */
        .section-title { 
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            font-size: 20px; font-weight: 900; margin: 30px 0 20px 0; color: var(--text-main);
            letter-spacing: 1px; display: flex; align-items: center; gap: 10px;
        }
        .section-title::before { content: ''; display: inline-block; width: 4px; height: 16px; background: var(--primary); border-radius: 2px; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 5px; }
        .menu-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; 
            overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5); 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .menu-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(220, 38, 38, 0.15); }
        .menu-card:hover .menu-name { color: #f87171; }
        
        .menu-img { width: 100%; height: 145px; object-fit: cover; background: #070203; border-bottom: 1px solid var(--border-color); }
        .menu-info { padding: 14px; display: flex; flex-direction: column; flex-grow: 1; }
        .menu-name { font-size: 15px; font-weight: 700; margin: 0 0 8px 0; color: var(--text-main); transition: color 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .menu-price { font-size: 16px; color: #fca5a5; font-weight: 800; margin: 0 0 14px 0; padding-bottom: 10px; border-bottom: 1px dashed var(--border-color); font-family: 'Orbitron', sans-serif; }
        
        .buy-btn { 
            margin-top: auto; background: linear-gradient(135deg, #250b10 0%, #190609 100%); 
            color: var(--text-main); border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; 
            cursor: pointer; font-weight: 700; font-size: 13px; transition: all 0.2s ease; 
        }
        .menu-card:hover .buy-btn {
            background: linear-gradient(135deg, var(--primary) 0%, #991b1b 100%);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        @media (max-width: 600px) {
            body { padding: 15px 10px; }
            .top-notice-box { padding: 20px 15px; margin-bottom: 10px; }
            .top-notice-box h1 { font-size: 26px; }
            .middle-action-bar { flex-direction: column; gap: 10px; align-items: stretch; margin-bottom: 10px; }
            .link-btn-container { gap: 8px; }
            .link-btn { padding: 11px; font-size: 13px; }
            .status-badge { height: 45px; width: 100%; }
            .sub-notice-wrap { padding: 10px 0; margin-bottom: 15px; }
            .menu-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .menu-img { height: 115px; }
            .menu-info { padding: 10px; }
            .menu-name { font-size: 14px; }
            .menu-price { font-size: 14px; }
            .buy-btn { padding: 9px; font-size: 12px; }
        }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <div class="top-notice-box">
        <h1 id="site-title">마켓 로딩 중</h1>
        <div id="site-notice" class="subtitle">공지사항을 동기화하는 중입니다...</div>
    </div>

    <div class="middle-action-bar">
        <div class="link-btn-container">
            <a href="https://discord.gg" target="_blank" class="link-btn btn-discord">👾 디스코드 채널</a>
            <a href="https://kakao.com" target="_blank" class="link-btn btn-kakao">💬 1:1 오픈톡</a>
        </div>
        <div id="status-bar" class="status-badge off">매니저 상태<strong>연동 중</strong></div>
    </div>

    <div class="sub-notice-wrap">
        <div id="site-subtitle" class="sub-notice-box">상점 세부 안내 데이터를 불러오고 있습니다...</div>
    </div>

    <div class="section-title">주문 가격표</div>
    <div id="menu-container" class="menu-grid">
        <p style="text-align: center; grid-column: 1/-1; color: var(--text-muted);">상품판을 구성하는 중입니다...</p>
    </div>

    <script>
        const FORMSPREE_SECURE_URL = "https://formspree.io/f/maqzwlzz"; 
        
        const URL_CSV_SHEET1 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCMxXYlK_oQcmQvgfKZZfdm0jgBtU9-z_Zu7RDPxTPLUl2bJ3amGjzpOiuiT9MH-wD_klSUkynKpvD/pub?gid=0&single=true&output=csv"; 
        const URL_CSV_SHEET2 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCMxXYlK_oQcmQvgfKZZfdm0jgBtU9-z_Zu7RDPxTPLUl2bJ3amGjzpOiuiT9MH-wD_klSUkynKpvD/pub?gid=688070023&single=true&output=csv"; 

        let sheet1Data = null; 
        let sheet2Data = null;

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            const result = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines.at(i);
                if (!line.trim()) continue;
                
                const row = [];
                let insideQuote = false;
                let entry = '';
                for (let j = 0; j < line.length; j++) {
                    const char = line.at(j);
                    if (char === '"') {
                        insideQuote = !insideQuote;
                    } else if (char === ',' && !insideQuote) {
                        row.push(entry.trim());
                        entry = '';
                    } else {
                        entry += char;
                    }
                }
                row.push(entry.trim());
                result.push(row);
            }
            return result;
        }

        function renderInterface() {
            if (!sheet1Data || !sheet2Data) return;

            const targetRow1 = sheet1Data.at(1);
            const currentStatus = targetRow1 ? String(targetRow1.at(0)).toUpperCase().trim() : 'OFF';
            
            const titleValue = sheet2Data.at(0) ? sheet2Data.at(0).at(1) : '레스너 SHOP';
            const noticeValue = sheet2Data.at(2) ? sheet2Data.at(2).at(1) : '공지사항이 없습니다.';
            const subtitleValue = sheet2Data.at(1) ? sheet2Data.at(1).at(1) : '';
            const customStatusText = sheet2Data.at(3) ? sheet2Data.at(3).at(1) : null;

            const statusBar = document.getElementById('status-bar');
            if (currentStatus === 'ON') {
                statusBar.innerHTML = `매니저 상태<strong>${customStatusText || '🟢 ON'}</strong>`;
                statusBar.className = "status-badge on";
            } else {
                statusBar.innerHTML = `매니저 상태<strong>${customStatusText || '🔴 OFF'}</strong>`;
                statusBar.className = "status-badge off";
            }

            document.getElementById('site-title').innerText = titleValue;
            document.getElementById('site-notice').innerText = noticeValue;
            document.getElementById('site-subtitle').innerText = subtitleValue;

            const container = document.getElementById('menu-container');
            container.innerHTML = ''; 

            for (let i = 1; i < sheet1Data.length; i++) {
                const row = sheet1Data.at(i);
                if (!row || row.length < 2) continue;

                const name = row.at(1);  
                const price = row.at(2); 
                const img = row.at(3) || 'https://placeholder.com'; 

                if (!name || name === "이름") continue; 

                container.innerHTML += `
                    <div class="menu-card">
                        <img src="${img}" class="menu-img" alt="${name}" oncontextmenu="return false;" ondragstart="return false;">
                        <div class="menu-info">
                            <p class="menu-name" title="${name}">${name}</p>
                            <p class="menu-price">${isNaN(Number(price)) ? price : Number(price).toLocaleString() + ' 원'}</p>
                            <button class="buy-btn" onclick="sendOrder('${name}', '${price}')">즉시 구매 요청</button>
                        </div>
                    </div>`;
            }
        }

        fetch(URL_CSV_SHEET2).then(res => res.text()).then(text => {
            sheet2Data = parseCSV(text);
            renderInterface();
        }).catch(err => console.error("Sheet2 로드 실패:", err));

        fetch(URL_CSV_SHEET1).then(res => res.text()).then(text => {
            sheet1Data = parseCSV(text);
            renderInterface();
        }).catch(err => console.error("Sheet1 로드 실패:", err));

        function sendOrder(menuName, menuPrice) {
            const confirmText = "상품을 구매 신청하시겠습니까?";
            const confirmOrder = confirm(menuName + " " + confirmText);
            if (!confirmOrder) return;
            
            const userContact = prompt("구매 진행을 위해 구매자님의 연락처(디스코드 태그 / 카톡 ID 등)를 입력해 주세요.\n(미입력 시 진행이 불가합니다.)");
            if (userContact === null) return;
            if (userContact.trim() === "") {
                alert("연락처를 정확히 입력해야 구매 요청이 가능합니다.");
                return;
            }
            
            const siteName = document.getElementById('site-title').innerText;
            const formattedPrice = isNaN(Number(menuPrice)) ? menuPrice : Number(menuPrice).toLocaleString() + '원';
            
            fetch(FORMSPREE_SECURE_URL, {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ 
                    "상점명": siteName, 
                    "신청상품": menuName, 
                    "금액": formattedPrice, 
                    "구매자연락처": userContact.trim(),
                    "시간": new Date().toLocaleString('ko-KR') 
                })
            }).then(res => {
                if (res.ok) alert('구매 요청과 연락처가 안전하게 전송되었습니다!');
                else alert('Formspree 오류가 발생했습니다. 대시보드를 확인하세요.');
            });
        }
        window.addEventListener('keydown', function (e) { if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 86 || (e.shiftKey && e.keyCode === 73))) { e.preventDefault(); return false; }
            });
    </script>
</body>
</html>
